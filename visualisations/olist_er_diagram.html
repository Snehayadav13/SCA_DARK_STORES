
<div id="erd" style="padding: 1rem 0"></div>
<style>
#erd svg { width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  ORDERS ||--o{ ORDER_ITEMS : contains
  ORDERS ||--o{ ORDER_PAYMENTS : has
  ORDERS ||--o{ ORDER_REVIEWS : receives
  ORDERS }o--|| CUSTOMERS : placed_by
  ORDER_ITEMS }o--|| PRODUCTS : includes
  ORDER_ITEMS }o--|| SELLERS : fulfilled_by
  CUSTOMERS }o--|| GEOLOCATION : located_at
  SELLERS }o--|| GEOLOCATION : located_at
  PRODUCTS }o--|| PRODUCT_CATEGORY_TRANSLATION : categorised_by

  ORDERS {
    string order_id PK
    string customer_id FK
    string order_status
    datetime order_purchase_timestamp
    datetime order_delivered_customer_date
    datetime order_estimated_delivery_date
  }
  CUSTOMERS {
    string customer_id PK
    string customer_unique_id
    string customer_zip_code_prefix FK
    string customer_city
    string customer_state
  }
  ORDER_ITEMS {
    string order_id FK
    int order_item_id
    string product_id FK
    string seller_id FK
    float price
    float freight_value
  }
  ORDER_PAYMENTS {
    string order_id FK
    int payment_sequential
    string payment_type
    float payment_value
  }
  ORDER_REVIEWS {
    string review_id PK
    string order_id FK
    int review_score
    datetime review_creation_date
  }
  PRODUCTS {
    string product_id PK
    string product_category_name FK
    float product_weight_g
    float product_length_cm
  }
  SELLERS {
    string seller_id PK
    string seller_zip_code_prefix FK
    string seller_city
    string seller_state
  }
  GEOLOCATION {
    string geolocation_zip_code_prefix PK
    float geolocation_lat
    float geolocation_lng
    string geolocation_city
    string geolocation_state
  }
  PRODUCT_CATEGORY_TRANSLATION {
    string product_category_name PK
    string product_category_name_english
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
